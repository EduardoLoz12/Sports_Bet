<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 · Centro de Apuestas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0d0d12; color: #e0e0e0; padding: 20px 24px; max-width: 1500px; margin: 0 auto; }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.header h1 { color: #f0c040; font-size: 1.5rem; letter-spacing: -0.02em; }
.last-update { font-size: 0.72rem; color: #555; }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
.kpi { background: #1a1a24; border-radius: 10px; padding: 16px; text-align: center; }
.kpi .label { font-size: 0.68rem; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.kpi .value { font-size: 1.6rem; font-weight: 700; }
.pos { color: #4caf82; } .neg { color: #e05252; } .neu { color: #e0e0e0; } .gold { color: #f0c040; }

.section-title { font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; margin-top: 32px; border-bottom: 1px solid #1e1e28; padding-bottom: 8px; }
.model-info { display: flex; flex-wrap: wrap; gap: 24px; background: #15151d; border: 1px solid #232330; border-radius: 8px; padding: 14px 20px; font-size: 0.78rem; color: #aaa; }
.model-info .mi-item { display: flex; flex-direction: column; gap: 2px; }
.model-info .mi-label { font-size: 0.62rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
.model-info .mi-val { font-size: 0.95rem; color: #ddd; font-weight: 600; }
.model-info .mi-val.pos { color: #4caf82; }

/* ── Match cards ── */
.matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 18px; }

.match-card {
  background: #1a1a24;
  border-radius: 12px;
  padding: 18px;
  border-left: 3px solid #252535;
  transition: border-color 0.2s;
}
.match-card.has-high { border-left-color: #4caf82; }
.match-card.has-med  { border-left-color: #f0c040; }

.match-header { margin-bottom: 14px; }
.match-teams { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 5px; }
.match-meta { font-size: 0.72rem; color: #666; display: flex; gap: 10px; align-items: center; }
.match-stage { background: #252535; border-radius: 4px; padding: 2px 7px; font-size: 0.65rem; color: #888; }

/* ── Team stats table ── */
.team-stats-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 0.78rem; }
.team-stats-table th { color: #444; font-weight: 500; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 5px; text-align: right; border-bottom: 1px solid #252535; }
.team-stats-table th:first-child { text-align: left; }
.team-stats-table td { padding: 5px 5px; vertical-align: middle; border-bottom: 1px solid #1a1a24; }
.team-stats-table td:not(:first-child) { text-align: right; color: #aaa; }
.team-name-cell { max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ddd; font-weight: 600; }
.league-tag { display: block; font-size: 0.58rem; color: #555; font-weight: 400; }
.form-badges { display: flex; gap: 2px; flex-wrap: nowrap; }
.badge { width: 16px; height: 16px; border-radius: 2px; font-size: 0.55rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.badge-W { background: #1d4a2f; color: #4caf82; }
.badge-D { background: #2a2a1a; color: #c8b84a; }
.badge-L { background: #4a1d1d; color: #e05252; }
.stat-val { font-size: 0.8rem; }
.no-data-cell { color: #444; font-size: 0.7rem; }
.rank-badge { background: #252535; color: #f0c040; font-size: 0.6rem; font-weight: 700; padding: 1px 4px; border-radius: 3px; margin-right: 3px; }

/* ── Prediction section ── */
.pred-section { margin-bottom: 14px; }
.pred-section-title { font-size: 0.62rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

.pred-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 8px 10px; background: #141420; border-radius: 8px; }
.pred-icon { font-size: 1rem; flex-shrink: 0; width: 22px; }
.pred-body { flex: 1; min-width: 0; }
.pred-market { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
.pred-pick { font-size: 0.85rem; color: #ddd; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pred-reasoning { font-size: 0.65rem; color: #666; margin-top: 2px; }
.pred-right { text-align: right; flex-shrink: 0; }
.pred-pct { font-size: 1.1rem; font-weight: 700; display: block; }
.pred-tier-badge { font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 3px; display: inline-block; }
.tier-HIGH { background: #1d4a2f; color: #4caf82; }
.tier-MED  { background: #2a2800; color: #f0c040; }
.tier-LOW  { background: #252535; color: #666; }
.pct-HIGH { color: #4caf82; }
.pct-MED  { color: #f0c040; }
.pct-LOW  { color: #555; }

/* ── Bet recommendations ── */
.bets-section { border-top: 1px solid #252535; padding-top: 12px; }
.bet-title { font-size: 0.62rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.bet-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: #141420; border-radius: 6px; margin-bottom: 5px; }
.bet-left { flex: 1; }
.bet-pick { font-size: 0.82rem; color: #ddd; font-weight: 600; }
.bet-detail { font-size: 0.65rem; color: #666; }
.bet-right { text-align: right; }
.bet-stake { font-size: 0.9rem; font-weight: 700; display: block; }
.stake-HIGH { color: #4caf82; } .stake-MED { color: #f0c040; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th { color: #666; font-weight: 500; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.05em; padding: 8px 12px; text-align: left; border-bottom: 1px solid #252535; }
td { padding: 10px 12px; border-bottom: 1px solid #1e1e28; }
tr:last-child td { border-bottom: none; }

.chart-wrap { height: 200px; }
.no-data { color: #444; font-size: 0.85rem; text-align: center; padding: 32px; }

.team-stats-wrap { overflow-x: auto; margin-bottom: 14px; -webkit-overflow-scrolling: touch; }
.team-stats-wrap .team-stats-table { margin-bottom: 0; }

/* ── Reddit sentiment ── */
.sentiment-block { border-top: 1px solid #252535; padding-top: 12px; margin-top: 4px; }
.sentiment-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.sentiment-label { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; }
.sentiment-posts { font-size: 0.58rem; color: #444; }
.sentiment-bar { display: flex; height: 18px; border-radius: 4px; overflow: hidden; margin-bottom: 7px; }
.sbar-home { background: #1d4a2f; display: flex; align-items: center; justify-content: center; }
.sbar-draw { background: #2a2a1a; display: flex; align-items: center; justify-content: center; }
.sbar-away { background: #4a1d1d; display: flex; align-items: center; justify-content: center; }
.sbar-pct  { font-size: 0.6rem; font-weight: 700; color: #ccc; white-space: nowrap; padding: 0 3px; }
.sentiment-labels { display: flex; justify-content: space-between; font-size: 0.6rem; margin-bottom: 6px; }
.slabel-home { color: #4caf82; }
.slabel-draw { color: #c8b84a; text-align: center; flex: 1; }
.slabel-away { color: #e05252; text-align: right; }
.sentiment-summary { font-size: 0.65rem; color: #666; font-style: italic; margin-bottom: 5px; }
.sentiment-themes { display: flex; flex-wrap: wrap; gap: 4px; }
.theme-tag { font-size: 0.58rem; background: #1a1a2e; color: #666; border-radius: 3px; padding: 2px 6px; }

/* ── WC2026 tournament panels ── */
.wc-block { border-top: 1px solid #252535; padding-top: 12px; margin-top: 4px; }
.wc-block-title { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.wc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.wc-team { background: #141420; border-radius: 8px; padding: 9px 10px; }
.wc-team-name { font-size: 0.72rem; color: #ddd; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wc-line { font-size: 0.64rem; color: #999; margin-bottom: 3px; line-height: 1.35; }
.wc-line .k { color: #555; }
.wc-pos { background: #252535; color: #f0c040; font-size: 0.58rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; }
.wc-qual { color: #4caf82; font-weight: 700; }
.wc-need { color: #f0c040; font-weight: 700; }
.wc-scorer { color: #ddd; }
.wc-res { display: inline-block; font-size: 0.58rem; font-weight: 700; padding: 0 3px; border-radius: 2px; margin-right: 2px; }
.wc-res-W { background: #1d4a2f; color: #4caf82; }
.wc-res-D { background: #2a2a1a; color: #c8b84a; }
.wc-res-L { background: #4a1d1d; color: #e05252; }

.footer { text-align: center; color: #444; font-size: 0.68rem; margin-top: 40px; padding-top: 16px; border-top: 1px solid #1a1a24; }
.footer a { color: #555; }

@media (max-width: 480px) {
  body { padding: 12px; }
  .matches-grid { grid-template-columns: 1fr; }
  .team-stats-table { font-size: 0.7rem; min-width: 420px; }
  .wc-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>⚽ WC 2026 · Centro de Apuestas</h1>
  <span class="last-update" id="last-update"></span>
</div>

<div class="section-title">Modelo Predictivo · Solo datos Mundial 2026</div>
<div id="model-info" class="model-info">Cargando información del modelo…</div>

<div class="section-title">Próximos Partidos · Análisis pre-apuesta</div>
<div class="matches-grid" id="matches-grid">
  <div class="no-data">Cargando predicciones…</div>
</div>

<div class="footer">v2.0.0 · Solo datos del Mundial 2026 · Herramienta de apoyo (sin tracking de dinero)<br>
  <a href="https://elozconsulting.com" target="_blank" rel="noopener">Eloz Consulting</a></div>

<script>
const MARKET_ICON  = { winner: '🏆', probabilities: '🔢', scoreline: '🎯' };
const MARKET_LABEL = { winner: 'Ganador', probabilities: 'Probabilidades 1X2', scoreline: 'Marcador probable' };
// Markets ordered by relevance for display
const MARKET_ORDER = ['winner', 'probabilities', 'scoreline'];

function formBadges(form) {
  if (!form || !form.length) return '<span style="color:#444;font-size:0.7rem">—</span>';
  return '<div class="form-badges">' + form.map(r => `<span class="badge badge-${r}">${r}</span>`).join('') + '</div>';
}

function statVal(v, suffix = '') {
  if (!v && v !== 0) return '<span class="no-data-cell">—</span>';
  if (v === 0) return '<span class="no-data-cell">N/A</span>';
  return `<span class="stat-val">${v}${suffix}</span>`;
}

function makeReasoning(p, home, away, hs, as_) {
  const m = p.market;
  if (m === 'probabilities') {
    return `Modelo Dixon-Coles · distribución completa 1X2 (no solo el favorito)`;
  }
  if (m === 'scoreline') {
    return `Resultado más probable según grilla de Poisson bivariada (λ = goles esperados local, μ = visita)`;
  }
  if (m === 'winner') {
    return `Rating de ataque/defensa calculado SOLO con resultados del Mundial 2026 (Poisson + shrinkage)`;
  }
  return '';
}

function wcTeamPanel(name, w) {
  if (!w) return `<div class="wc-team"><div class="wc-team-name">${name}</div>
    <div class="wc-line k">Sin datos del Mundial aún</div></div>`;

  let groupLine = '';
  if (w.points != null) {
    const pos = w.position ? `<span class="wc-pos">#${w.position}</span> ` : '';
    const gd = w.gd != null ? (w.gd > 0 ? `+${w.gd}` : `${w.gd}`) : '—';
    groupLine = `<div class="wc-line">${pos}<span class="k">${w.group || 'Grupo'}</span> ·
      ${w.points} pts · J${w.played}/3 · DG ${gd}</div>`;
  }

  let qualLine = '';
  if (w.qualified) {
    qualLine = `<div class="wc-line"><span class="wc-qual">✓ ${w.qualified}</span></div>`;
  } else if (w.pts_to_qualify != null) {
    qualLine = `<div class="wc-line"><span class="k">≈ clasificación:</span>
      <span class="wc-need">${w.pts_to_qualify} pts</span> <span class="k">(est.)</span></div>`;
  }

  let scorerLine = '';
  if (w.top_scorer) {
    scorerLine = `<div class="wc-line"><span class="k">Goleador:</span>
      <span class="wc-scorer">${w.top_scorer.name} ⚽${w.top_scorer.goals}</span></div>`;
  }
  const goalsLine = `<div class="wc-line"><span class="k">Goles:</span> ${w.gf != null ? w.gf : '—'} ·
    <span class="k">Asist:</span> ${w.team_assists || 0}</div>`;

  let pastLine = '';
  if (w.past_results && w.past_results.length) {
    pastLine = `<div class="wc-line"><span class="k">Jugó:</span> ` +
      w.past_results.map(r =>
        `<span class="wc-res wc-res-${r.res}">${r.score}</span>${r.opp}`).join(' · ') + `</div>`;
  }
  let remLine = '';
  if (w.remaining_fixtures && w.remaining_fixtures.length) {
    remLine = `<div class="wc-line"><span class="k">Falta:</span> ${w.remaining_fixtures.join(' · ')}</div>`;
  }

  return `<div class="wc-team">
    <div class="wc-team-name">${name}</div>
    ${groupLine}${qualLine}${goalsLine}${scorerLine}${pastLine}${remLine}
  </div>`;
}

function buildWcBlock(m) {
  if (!m.home_wc && !m.away_wc) return '';
  return `<div class="wc-block">
    <div class="wc-block-title">📊 Mundial 2026 · grupo · goleo · camino</div>
    <div class="wc-grid">
      ${wcTeamPanel(m.home, m.home_wc)}
      ${wcTeamPanel(m.away, m.away_wc)}
    </div>
  </div>`;
}

function buildMatchCard(m) {
  const hs  = m.home_stats;
  const as_ = m.away_stats;
  const hasHigh = m.predictions.some(p => p.tier === 'HIGH');
  const hasMed  = m.predictions.some(p => p.tier === 'MED');
  const cls = hasHigh ? 'has-high' : hasMed ? 'has-med' : '';

  // No predictions yet
  if (!m.predictions || !m.predictions.length) {
    return `<div class="match-card">
      <div class="match-header">
        <div class="match-teams">${m.home} vs ${m.away}</div>
        <div class="match-meta"><span>📅 ${m.kickoff_pe}</span><span class="match-stage">${m.stage}</span></div>
      </div>
      <div style="color:#555;font-size:0.78rem;padding:10px 0">
        ⏳ Stats pendientes — cron corre 6:00 AM PE
      </div>
    </div>`;
  }

  // Team stats table
  const hasAnyStats = hs || as_;
  let statsHtml = '';
  if (hasAnyStats) {
    const pct = v => v != null ? `${v}%` : '—';
    const num = v => v != null && v !== 0 ? v : '—';

    const teamRow = (name, s) => {
      if (!s) return `<tr>
        <td class="team-name-cell" colspan="7" style="color:#444">Sin datos — ${name}</td>
      </tr>`;
      const form5 = (s.form || []).slice(-5);

      const rankStr  = s.fifa_rank  ? `<span class="rank-badge">#${s.fifa_rank}</span>` : '';
      const wc_stars = s.wc_titles  ? '★'.repeat(Math.min(s.wc_titles, 5)) : '';

      return `<tr>
        <td class="team-name-cell">
          ${rankStr} ${name}
          <span class="league-tag">${s.confederation || ''} ${wc_stars ? '· WC:' + wc_stars : ''}</span>
        </td>
        <td>${formBadges(form5)}</td>
        <td class="${(s.win_pct||0)>=60?'pos':(s.win_pct||0)>=40?'':'neg'}">${pct(s.win_pct)}</td>
        <td>${pct(s.draw_pct)}</td>
        <td class="${(s.loss_pct||0)>=40?'neg':''}">${pct(s.loss_pct)}</td>
        <td>${pct(s.clean_sheet_pct)}</td>
        <td class="${(s.big_win_pct||0)>=20?'pos':''}">${pct(s.big_win_pct)}</td>
      </tr>`;
    };
    statsHtml = `
      <div class="team-stats-wrap">
      <table class="team-stats-table">
        <thead><tr>
          <th>Equipo</th>
          <th>Forma Mundial</th>
          <th>W%</th>
          <th>D%</th>
          <th>L%</th>
          <th>CS%</th>
          <th>3+W%</th>
        </tr></thead>
        <tbody>
          ${teamRow(m.home, hs)}
          ${teamRow(m.away, as_)}
        </tbody>
      </table>
      </div>`;
  }

  // Predictions only — no bet recommendations (user decides stakes)
  const sortedPreds = [...m.predictions].sort(
    (a, b) => MARKET_ORDER.indexOf(a.market) - MARKET_ORDER.indexOf(b.market)
  );
  const predHtml = sortedPreds.map(p => {
    const icon = MARKET_ICON[p.market] || '📊';
    const label = MARKET_LABEL[p.market] || p.market;
    const reasoning = makeReasoning(p, m.home, m.away, hs, as_);
    return `<div class="pred-row">
      <div class="pred-icon">${icon}</div>
      <div class="pred-body">
        <div class="pred-market">${label}</div>
        <div class="pred-pick">${p.pick}</div>
        ${reasoning ? `<div class="pred-reasoning">${reasoning}</div>` : ''}
      </div>
      <div class="pred-right">
        <span class="pred-pct pct-${p.tier}">${p.confidence}%</span>
        <span class="pred-tier-badge tier-${p.tier}">${p.tier}</span>
      </div>
    </div>`;
  }).join('');

  // Sentiment block
  let sentimentHtml = '';
  if (m.sentiment) {
    const s = m.sentiment;
    const homeW = Math.max(s.home_win_pct, 5);
    const drawW = Math.max(s.draw_pct, 5);
    const awayW = Math.max(s.away_win_pct, 5);
    const themes = (s.top_themes || []).map(t => `<span class="theme-tag">${t}</span>`).join('');
    sentimentHtml = `
      <div class="sentiment-block">
        <div class="sentiment-header">
          <span class="sentiment-label">🟠 Reddit crowd · ${s.post_count} comentarios</span>
        </div>
        <div class="sentiment-bar">
          <div class="sbar-home" style="flex:${homeW}"><span class="sbar-pct">${s.home_win_pct}%</span></div>
          <div class="sbar-draw" style="flex:${drawW}"><span class="sbar-pct">${s.draw_pct}%</span></div>
          <div class="sbar-away" style="flex:${awayW}"><span class="sbar-pct">${s.away_win_pct}%</span></div>
        </div>
        <div class="sentiment-labels">
          <span class="slabel-home">${m.home}</span>
          <span class="slabel-draw">Empate</span>
          <span class="slabel-away">${m.away}</span>
        </div>
        ${s.summary ? `<div class="sentiment-summary">"${s.summary}"</div>` : ''}
        ${themes ? `<div class="sentiment-themes">${themes}</div>` : ''}
      </div>`;
  }

  return `<div class="match-card ${cls}">
    <div class="match-header">
      <div class="match-teams">${m.home} vs ${m.away}</div>
      <div class="match-meta">
        <span>📅 ${m.kickoff_pe}</span>
        <span class="match-stage">${m.stage}</span>
      </div>
    </div>
    ${statsHtml}
    <div class="pred-section">
      <div class="pred-section-title">Predicciones del modelo</div>
      ${predHtml}
    </div>
    ${buildWcBlock(m)}
    ${sentimentHtml}
  </div>`;
}

async function loadAll() {
  try {
    const mi = await fetch('/api/model_info').then(r => r.json());
    const miEl = document.getElementById('model-info');
    if (mi.available) {
      miEl.innerHTML = `
        <div class="mi-item"><span class="mi-label">Modelo</span><span class="mi-val">${mi.model}</span></div>
        <div class="mi-item"><span class="mi-label">Partidos WC jugados</span><span class="mi-val pos">${mi.n_wc_matches}</span></div>
        <div class="mi-item"><span class="mi-label">Equipos con rating</span><span class="mi-val">${mi.teams_rated}</span></div>
        <div class="mi-item"><span class="mi-label">Media goles/equipo (μ)</span><span class="mi-val">${mi.mu_league ?? '—'}</span></div>
        <div class="mi-item"><span class="mi-label">Shrinkage (k)</span><span class="mi-val">${mi.k ?? '—'}</span></div>
        <div class="mi-item"><span class="mi-label">Actualizado</span><span class="mi-val">${mi.updated ?? '—'}</span></div>
      `;
    } else {
      miEl.textContent = 'Modelo aún no calculado — corre tools/predict_wc2026.py';
    }

    const matches = await fetch('/api/upcoming').then(r => r.json());
    const grid = document.getElementById('matches-grid');
    grid.innerHTML = matches.length
      ? matches.map(buildMatchCard).join('')
      : '<div class="no-data">⏳ Fase de grupos terminada — esperando que football-data.org asigne los cruces de eliminatoria (Last 32). Se actualiza solo en el próximo cron.</div>';

    document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-PE');
  } catch(e) {
    console.error('Dashboard error:', e);
  }
}

loadAll();
setInterval(loadAll, 120000);
</script>
</body>
</html>
